{% extends "base.html" %} {% block content %}
<br>
<div class="entire_body">
<h2><b>Traffic Sign Recognition Using Machine Learning and Python</b></h2>
<br>
<img src="/static/css/main_img_disp.jpg" alt="" style="width: 30%; height:30%; margin:40px;" >
<br>
<div>
    <form id="upload-file" method="post" enctype="multipart/form-data">
        <label for="imageUpload" class="upload-label">
            Choose file...
        </label>
        <input type="file" name="file" id="imageUpload" accept=".png, .jpg, .jpeg">
    </form>

    <div class="image-section" style="display:none;">
        <div class="img-preview">
            <div id="imagePreview">
            </div>
        </div>
        <div>
            <button type="button" class="btn btn-primary btn-lg " id="btn-predict" style="margin:50px; margin-top:20px; ">Predict!</button>
        </div>
    </div>

    <div class="loader" style="display:none;"></div>

    <h1 id="result" style="margin:50px; ">
        <span> </span>
    </h1>
<br><br>
</div>
</div>
{% endblock %}
